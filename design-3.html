<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      /* Base Reset & Light Mode Variables */
      :root {
        --bg-main: #f8fafc;
        --surface: #ffffff;
        --surface-hover: #f1f5f9;
        --primary-blue: #0252e3;
        --accent-blue: #3b82f6;
        --text-main: #0f172a;
        --text-dim: #64748b;
        --border: #e2e8f0;
        --border-hover: #cbd5e1;

        /* Visual Warning Colors */
        --success: #10b981;
        --warning: #f59e0b;
        --danger: #ef4444;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
      }

      body {
        background-color: var(--bg-main);
        color: var(--text-main);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }
      
      /* Persistent Navigation Bar (UNTOUCHED / APPROVED) */
      nav {
        background-color: var(--surface);
        border-bottom: 2px solid var(--border);
        padding: 0.75rem 2rem;
        display: flex;
        justify-content: space-between;
        align-items: center;
        position: sticky;
        top: 0;
        z-index: 100;
      }

      .nav-right {
        display: flex;
        align-items: center;
        gap: 15px;
      }

      .dashboard-title {
        font-size: 1.3rem;
        font-weight: 700;
        color: var(--text-main);
        background-color: #dbecff;
        padding: 6px 12px;
        border-radius: 6px;
      }

      .dashboard-filters {
        display: flex;
        gap: 8px;
      }

      .filter-btn {
        border: none;
        background: #e2e8f0;
        padding: 10px 18px;
        border-radius: 6px;
        cursor: pointer;
        font-weight: 600;
      }

      .filter-btn.active {
        background: var(--primary-blue);
        color: #fff;
      }

      .filter-btn:hover {
        background: var(--accent-blue);
        color: #fff;
      }

      .logo {
        display: flex;
        align-items: center;
        gap: 10px;
        font-weight: 800;
        font-size: 1.1rem;
        letter-spacing: -0.5px;
      }

      .project-info h2 {
        margin: 0;
        font-size: 1.4rem;
      }

      .project-info {
        font-size: 0.9rem;
        background-color: #dbecff;
        padding: 6px 12px;
        border-radius: 6px;
      }

      .back-btn {
        background: var(--primary-blue);
        color: white;
        border: none;
        padding: 10px 18px;
        border-radius: 6px;
        cursor: pointer;
        font-weight: 600;
      }

      .back-btn:hover {
        background: var(--accent-blue);
      }

      /* Workspace View Section Rules */
      main {
        padding: 1.5rem;
        flex: 1;
      }

      .view-section {
        display: none;
      }

      .view-section.active {
        display: block;
      }

      /* ==========================================================================
         NEW SCREEN 1 DESIGN: MODERN HIGH-DENSITY ANALYTIC GRID
         ========================================================================== */
      .modern-project-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 20px;
      }

      .metric-project-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-top: 4px solid var(--accent-blue);
        border-radius: 8px;
        padding: 16px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        cursor: pointer;
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      }

      .metric-project-card:hover {
        transform: translateY(-2px);
        border-top-color: var(--primary-blue);
        box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
      }

      .card-info-block {
        display: flex;
        flex-direction: column;
        gap: 6px;
        max-width: 70%;
      }

      .card-id-tag {
        font-size: 0.75rem;
        font-weight: 800;
        color: var(--text-dim);
        letter-spacing: 0.5px;
      }

      .card-main-title {
        font-size: 1rem;
        font-weight: 700;
        color: var(--text-main);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .card-sub-stats {
        font-size: 0.8rem;
        font-weight: 600;
        color: var(--text-dim);
      }

      /* Circle Ring Visual Progress Indicator */
      .progress-ring-container {
        position: relative;
        width: 54px;
        height: 54px;
      }

      .progress-ring-text {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        font-size: 0.75rem;
        font-weight: 700;
        color: var(--text-main);
      }

      /* ==========================================================================
         NEW SCREEN 2 DESIGN: LINEAR PERFORMANCE MATRIX
         ========================================================================== */
      .matrix-table-wrapper {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 8px;
        overflow: hidden;
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
      }

      .matrix-row-item {
        display: grid;
        grid-template-columns: 70px 100px 1fr 180px 120px;
        align-items: center;
        border-bottom: 1px solid var(--border);
        transition: background 0.1s ease;
      }

      .matrix-row-item:last-child {
        border-bottom: none;
      }

      .matrix-row-item.matrix-header {
        background: #f1f5f9;
        font-weight: 800;
        font-size: 0.8rem;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        color: var(--text-dim);
      }

      .matrix-row-item:not(.matrix-header):hover {
        background: var(--surface-hover);
      }

      .matrix-cell {
        padding: 16px;
        font-size: 0.9rem;
        font-weight: 600;
      }

      .matrix-cell.center {
        text-align: center;
      }

      .matrix-id {
        font-weight: 700;
        color: var(--primary-blue);
      }

      .matrix-resource-badge {
        display: inline-block;
        background: #e2e8f0;
        color: var(--text-main);
        padding: 4px 8px;
        border-radius: 4px;
        font-size: 0.75rem;
        font-weight: 700;
        text-align: center;
        min-width: 70px;
      }

      .matrix-desc {
        color: var(--text-main);
        font-weight: 600;
      }

      /* Hours and status displays */
      .matrix-hours-pill {
        display: flex;
        flex-direction: column;
        gap: 2px;
      }

      .hours-line {
        font-size: 0.8rem;
        display: flex;
        justify-content: space-between;
      }

      .hours-line.overrun {
        color: var(--danger);
        font-weight: 700;
      }

      .status-pill-fill {
        background: #ecfdf5;
        color: var(--success);
        padding: 6px;
        border-radius: 6px;
        font-size: 0.8rem;
        font-weight: 700;
        text-align: center;
      }

      .status-pill-fill.active {
        background: #eff6ff;
        color: var(--accent-blue);
      }

      .status-pill-fill.warning {
        background: #fffbeb;
        color: var(--warning);
      }
    </style>
  </head>
  <body>
    <!-- Common Approved Navbar Framework -->
    <nav>
      <div class="logo">
        <img src="./assets/logo.png" alt="Company Logo" style="height:50px;" onerror="this.style.display='none'">
        <div class="dashboard-title" id="dashboardTitle">ShipYard</div>
        <div id="project-info" class="project-info" style="display:none;">
          <h2 id="projectName">Project Name</h2>
        </div>
      </div>

      <div class="nav-right">
        <div id="dashboardFilters" class="dashboard-filters">
          <button class="filter-btn active">Yard</button>
          <button class="filter-btn">Shop</button>
          <button class="filter-btn">New</button>
          <button class="filter-btn">Supply</button>
        </div>

        <div id="detailsHeader" style="display: none">
          <button class="back-btn" onclick="switchView('dashboard')">← Return to Projects</button>
        </div>
      </div>
    </nav>

    <!-- Content Workspace -->
    <main>
      <!-- ========================================================== -->
      <!-- VIEW 1: PROJECT HUD SCREEN                                 -->
      <!-- ========================================================== -->
      <section id="dashboard" class="view-section active">
        <div class="modern-project-grid" id="posGridContainer">
          <!-- Dynamically compiled analytical project tiles -->
        </div>
      </section>

      <!-- ========================================================== -->
      <!-- VIEW 2: LINEAR PERFORMANCE MATRIX TASK VIEW                -->
      <!-- ========================================================== -->
      <section id="details" class="view-section">
        <div class="matrix-table-wrapper">
          <!-- Table Header -->
          <div class="matrix-row-item matrix-header">
            <div class="matrix-cell">ID</div>
            <div class="matrix-cell">Resource</div>
            <div class="matrix-cell">Operation Description</div>
            <div class="matrix-cell">Hours</div>
            <div class="matrix-cell center">Progress</div>
          </div>
          <!-- Table Rows Container -->
          <div id="matrixRowsContainer"></div>
        </div>
      </section>
    </main>

    <script>
      // Production Operational Dataset
      const taskData = [
        { task: 1, co: "", description: "DC battery/charging - trickle charger won't charge battery", resource: "Elec", estHrs: 15, actHrs: 22, progress: "100%" },
        { task: 2, co: "", description: "Troubleshoot & replace seized water pump", resource: "Mech", estHrs: 25, actHrs: 26, progress: "50%" },
        { task: 3, co: "", description: "Troubleshoot hot water", resource: "Plumb", estHrs: 10, actHrs: 22, progress: "100%" },
        { task: 4, co: "", description: "Troubleshoot main bilge pumps", resource: "Mech", estHrs: 20, actHrs: 25, progress: "80%" },
        { task: 5, co: "", description: "Fix wiring issue with rear bilge", resource: "Blast", estHrs: 30, actHrs: 22, progress: "80%" },
        { task: 6, co: "", description: "Check wiring forward bilge", resource: "Cust", estHrs: 10, actHrs: 22, progress: "80%" },
        { task: 7, co: "", description: "Get diesel heating system operational", resource: "Mech", estHrs: 35, actHrs: 42, progress: "80%" },
        { task: 8, co: "", description: "Determine what to keep running when sitting for long periods", resource: "Mech", estHrs: 5, actHrs: 6, progress: "80%" },
        { task: 9, co: "", description: "Inspect fuel tank and clean sediment", resource: "Mech", estHrs: 18, actHrs: 22, progress: "40%" },
        { task: 10, co: "", description: "Replace damaged navigation lights", resource: "Elec", estHrs: 12, actHrs: 22, progress: "60%" },
        { task: 11, co: "", description: "Repair freshwater plumbing leak", resource: "Plumb", estHrs: 14, actHrs: 28, progress: "25%" },
        { task: 12, co: "", description: "Inspect propeller shaft alignment", resource: "Mech", estHrs: 20, actHrs: 29, progress: "70%" },
        { task: 13, co: "", description: "Replace engine oil and filters", resource: "Mech", estHrs: 8, actHrs: 12, progress: "100%" },
        { task: 14, co: "", description: "Check and repair deck lighting", resource: "Elec", estHrs: 16, actHrs: 22, progress: "55%" },
        { task: 15, co: "", description: "Inspect hull for corrosion", resource: "Blast", estHrs: 22, actHrs: 22, progress: "35%" },
        { task: 16, co: "", description: "Apply anti-fouling paint to hull", resource: "Paint", estHrs: 40, actHrs: 22, progress: "20%" },
        { task: 17, co: "", description: "Test emergency bilge alarm system", resource: "Elec", estHrs: 6, actHrs: 8, progress: "90%" },
        { task: 18, co: "", description: "Repair anchor winch controls", resource: "Mech", estHrs: 18, actHrs: 22, progress: "45%" },
        { task: 19, co: "", description: "Replace damaged cabin windows", resource: "Cust", estHrs: 24, actHrs: 28, progress: "30%" },
        { task: 20, co: "", description: "Inspect and tighten deck fittings", resource: "Mech", estHrs: 12, actHrs: 30, progress: "65%" },
      ];

      const projectMock = [
        "STRIVOUR", "CALVADA", "@EASTERN MACHINING", "@VARIETY MARINE SERVICES",
        "@MOONLIGHT MARINE", "OCEAN BETTY", "@RIPPLEFXWATER INC.", "THETIS QUEEN",
        "@RIGEL MARINE SERVICES - 1", "H.N HODDER", "@PALMER, PAUL", "@JAMIE VAN POELE",
        "@SEALIFE OCEAN DREAMS"
      ];

      // 1. Render Screen 1: High-Density Project HUD Grid
      const gridContainer = document.getElementById("posGridContainer");
      for (let i = 1; i <= 70; i++) {
        const projectName = projectMock[(i - 1) % projectMock.length];
        const paddedId = String(i).padStart(4, "974");
        
        // Mocking progressive completion value based on calculation variants

        const cardNode = document.createElement("div");
        cardNode.className = "metric-project-card";
        cardNode.addEventListener('click', () => {
          document.getElementById('projectName').textContent = projectName;
          switchView('details');
        });

        cardNode.innerHTML = `
          <div class="card-info-block">
            <span class="card-id-tag">#${paddedId}</span>
            <div class="card-main-title">${projectName}</div>
          </div>
        `;
        gridContainer.appendChild(cardNode);
      }

      // 2. Render Screen 2: High-Contrast Performance Matrix
      const matrixContainer = document.getElementById("matrixRowsContainer");
      taskData.forEach((task) => {
        const rowNode = document.createElement("div");
        rowNode.className = "matrix-row-item";

        const isOverrun = task.actHrs > task.estHrs;
        const rawProgress = parseInt(task.progress);
        
        let progressStyleClass = "active";
        if (rawProgress === 100) progressStyleClass = "";
        else if (rawProgress < 40) progressStyleClass = "warning";

        rowNode.innerHTML = `
          <div class="matrix-cell matrix-id">${task.task}</div>
          <div class="matrix-cell">
            <span class="matrix-resource-badge">${task.resource || 'Gen'}</span>
          </div>
          <div class="matrix-cell matrix-desc">${task.description}</div>
          <div class="matrix-cell matrix-hours-pill">
            <div class="hours-line"><span>EST:</span><span>${task.estHrs} hrs</span></div>
            <div class="hours-line ${isOverrun ? 'overrun' : ''}">
              <span>ACT:</span><span>${task.actHrs} hrs</span>
            </div>
          </div>
          <div class="matrix-cell center">
            <div class="status-pill-fill ${progressStyleClass}">${task.progress}</div>
          </div>
        `;
        matrixContainer.appendChild(rowNode);
      });

      // Navigation & Layout View Controller
      function switchView(viewId) {
        document.querySelectorAll('.view-section').forEach(section => section.classList.remove('active'));
        document.getElementById(viewId).classList.add('active');

        const header = document.getElementById('detailsHeader');
        const projectInfo = document.getElementById('project-info');
        const filters = document.getElementById('dashboardFilters');
        const dashboardTitle = document.getElementById('dashboardTitle');

        if (viewId === 'details') {
          header.style.display = 'flex';
          projectInfo.style.display = 'flex';
          filters.style.display = 'none';
          dashboardTitle.style.display = 'none';
        } else {
          header.style.display = 'none';
          projectInfo.style.display = 'none';
          filters.style.display = 'flex';
          dashboardTitle.style.display = 'block';
        }
      }

      // Filter Button Switcher
      document.getElementById('dashboardFilters').addEventListener('click', function (e) {
        if (!e.target.classList.contains('filter-btn')) return;
        document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
        e.target.classList.add('active');
      });
    </script>
  </body>
</html>
