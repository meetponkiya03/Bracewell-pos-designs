<!DOCTYPE html>
<html lang="en">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
    
    :root{
    --blue:#0252e3;
    --bg:#f1f5f9;
    --card:#ffffff;
    --border:#e2e8f0;
    --text:#0f172a;
    --muted:#64748b;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI,sans-serif;
}

body{
    background:var(--bg);
}

nav{
    background:white;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:12px 24px;
    box-shadow:0 1px 5px rgba(0,0,0,.05);
}

.nav-left,
.nav-right{
    display:flex;
    align-items:center;
    gap:15px;
}

.logo{
    height:50px;
}

.navbar-title{
    font-size:22px;
    font-weight:700;
}

.project-header{
    display:none;
    background:#dbeafe;
    color:#1e40af;
    font-weight:700;
    padding:10px 16px;
    border-radius:8px;
}

.filters{
    display:flex;
    gap:10px;
}

.filter-btn{
    border:none;
    padding:10px 18px;
    border-radius:8px;
    cursor:pointer;
    background:#e2e8f0;
    font-weight:600;
}

.filter-btn.active{
    background:var(--blue);
    color:white;
}

.back-btn{
    display:none;
    border:none;
    background:var(--blue);
    color:white;
    padding:10px 18px;
    border-radius:8px;
    cursor:pointer;
}

main{
    padding:20px;
}

.project-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
    gap:15px;
}

.project-card{
    background:white;
    padding:18px;
    border-radius:10px;
    cursor:pointer;
    transition:.2s;
    border-bottom:3px solid var(--border);
}

.project-card:hover{
    border-color:var(--blue);
    transform:translateY(-2px);
}

.project-id{
    color:var(--muted);
    font-size:12px;
    margin-bottom:8px;
}

.project-name{
    font-weight:700;
    font-size:18px;
}

#taskPanel{
    display:none;
}

.task-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(380px,1fr));
    gap:15px;
}

.task-card{
    background:white;
    padding:20px;
    border-radius:10px;
    border-left:5px solid var(--blue);
    box-shadow:0 2px 8px rgba(0,0,0,.05);
}

.task-title{
    font-weight:700;
    margin-bottom:10px;
}

.task-desc{
    color:#475569;
    margin-bottom:15px;
    line-height:1.5;
}

.task-footer{
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
    gap:10px;
}

.badge{
    padding:6px 10px;
    border-radius:6px;
    font-size:12px;
    font-weight:600;
}

.resource{
    background:#dbeafe;
    color:#1d4ed8;
}

.progress{
    background:#dcfce7;
    color:#15803d;
}</style>
</head>

        </div>

        <div id="projectHeader" class="project-header">

        </div>

    </div>

    <div class="nav-right">

        <div id="filterSection" class="filters">

            <button class="filter-btn active">
                Yard
            </button>

            <button class="filter-btn">
                Shop
            </button>

            <button class="filter-btn">
                New

            <button class="filter-btn">

        </div>

        <button
            id="backBtn"
            class="back-btn"
            onclick="goToDashboard()">

    </div>
</nav>

    const card =
        document.createElement("div");
    card.className = "project-card";

    card.innerHTML = `
        <div class="project-id">
            Project #${String(index+1).padStart(3,"0")}
        </div>

        <div class="project-name">
            ${project}
        </div>
    `;

    card.addEventListener("click",()=>{

        document.getElementById("dashboardPanel")
            .style.display="none";

        document.getElementById("taskPanel")
            .style.display="block";

        document.getElementById("dashboardTitle")
            .style.display="none";

        document.getElementById("projectHeader")
            .style.display="block";

        document.getElementById("projectName")
            .innerText=project;

        document.getElementById("filterSection")
            .style.display="none";

        document.getElementById("backBtn")
            .style.display="block";

    });

    gridAnchor.appendChild(card);

const taskContainer =

taskData.forEach(task=>{

    card.className="task-card";

    card.innerHTML=`

        <div class="task-title">
            ${task.task}
        </div>

        <div class="task-desc">
            ${task.description}
        </div>

        <div class="task-footer">

            </span>

            <span>

            </span>

            <span class="badge progress">

            </span>

function goToDashboard(){

    document.getElementById("taskPanel")
        .style.display="none";

    document.getElementById("dashboardPanel")
        .style.display="block";

    document.getElementById("dashboardTitle")
        .style.display="block";

    document.getElementById("projectHeader")
        .style.display="none";

    document.getElementById("filterSection")
        .style.display="flex";

    document.getElementById("backBtn")
        .style.display="none";
}

document
.querySelectorAll(".filter-btn")
.forEach(btn=>{

    btn.addEventListener("click",()=>{

        document
        .querySelectorAll(".filter-btn")
        .forEach(x=>x.classList.remove("active"));

        btn.classList.add("active");

    });

});
